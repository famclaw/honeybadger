name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all targets
        run: make cross

      - name: HoneyBadger self-check
        run: |
          ./bin/honeybadger-linux-amd64 scan github.com/famclaw/honeybadger \
            --paranoia strict --format ndjson | tee self-report.json
          verdict=$(grep '"type":"result"' self-report.json | jq -r .verdict || echo "UNKNOWN")
          if [ "$verdict" = "FAIL" ]; then
            echo "Self-check FAILED"
            exit 1
          fi

      - name: Generate SHA256SUMS
        run: sha256sum bin/* > SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: bin/*

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign with cosign
        run: |
          for f in bin/*; do
            cosign sign-blob --yes "$f" --bundle "${f}.bundle"
          done

      - name: Verify cosign signatures
        run: |
          for f in bin/*; do
            cosign verify-blob "$f" \
              --bundle "${f}.bundle" \
              --certificate-identity-regexp=".*famclaw/honeybadger.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.spdx.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/*
            SHA256SUMS
            sbom.spdx.json
            self-report.json

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
